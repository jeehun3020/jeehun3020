<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Jihoon Jeong — Computer Vision and AI Researcher">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#4f46e5"/>
      <stop offset="55%"  stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <radialGradient id="orbWhite" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="55%"  stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbAmber" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fbbf24" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="text-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <clipPath id="clipFrame">
      <rect x="0" y="0" width="1200" height="320" rx="24" ry="24"/>
    </clipPath>
  </defs>

  <!-- Frame -->
  <rect width="1200" height="320" rx="24" fill="url(#bg)"/>

  <!-- Floating orbs (clipped inside the frame) -->
  <g clip-path="url(#clipFrame)">
    <circle r="260" fill="url(#orbWhite)" opacity="0.9">
      <animate attributeName="cx" values="200;1000;200"   dur="22s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="80;240;80"      dur="22s" repeatCount="indefinite"/>
    </circle>
    <circle r="200" fill="url(#orbAmber)" opacity="0.85">
      <animate attributeName="cx" values="1100;200;1100"  dur="26s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="220;100;220"    dur="26s" repeatCount="indefinite"/>
    </circle>
    <circle r="120" fill="url(#orbWhite)" opacity="0.6">
      <animate attributeName="cx" values="600;200;1000;600" dur="30s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="40;200;120;40"     dur="30s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Status pill -->
  <g transform="translate(80, 56)">
    <rect x="0" y="0" width="320" height="34" rx="17" fill="white" fill-opacity="0.16" stroke="white" stroke-opacity="0.30"/>
    <!-- pulse ring -->
    <circle cx="20" cy="17" r="5" fill="#86efac" opacity="0.8">
      <animate attributeName="r"       values="5;14;5"   dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0;0.7" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- core dot -->
    <circle cx="20" cy="17" r="5" fill="#86efac">
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="38" y="22" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="12" font-weight="600" fill="white" letter-spacing="0.14em">AVAILABLE FOR RESEARCH COLLABORATION</text>
  </g>

  <!-- Name -->
  <text x="80" y="170" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="60" font-weight="800" fill="white" letter-spacing="-0.02em">
    Hi, I'm <tspan fill="url(#text-grad)">Jihoon Jeong</tspan>
    <tspan dx="6">👋</tspan>
  </text>

  <!-- Role -->
  <text x="80" y="220" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="22" font-weight="500" fill="white" fill-opacity="0.94">
    Computer Vision · AI Researcher · Builder of Things
  </text>

  <!-- Bio rows -->
  <text x="80" y="256" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="14" fill="white" fill-opacity="0.78">
    Bachelor @ Kyonggi University · GPA 4.49 / 4.5
  </text>
  <text x="80" y="278" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="14" fill="white" fill-opacity="0.78">
    jeehun3020.github.io · jeehun3020@gmail.com
  </text>

  <!-- bottom shimmer line -->
  <rect x="0" y="316" width="1200" height="4" fill="white" fill-opacity="0.12"/>
  <rect x="-200" y="316" width="200" height="4" fill="white" fill-opacity="0.55">
    <animate attributeName="x" values="-200;1200" dur="6s" repeatCount="indefinite"/>
  </rect>
</svg>
